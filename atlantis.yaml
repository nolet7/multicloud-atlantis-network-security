version: 3
parallel_plan: true
parallel_apply: false

projects:
  - name: aws-network-security
    dir: live/aws/network-security
    workspace: default
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - "../../../policies/**/*.rego"
    apply_requirements:
      - approved
      - mergeable

  - name: azure-network-security
    dir: live/azure/network-security
    workspace: default
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - "../../../policies/**/*.rego"
    apply_requirements:
      - approved
      - mergeable

  - name: gcp-network-security
    dir: live/gcp/network-security
    workspace: default
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - "../../../policies/**/*.rego"
    apply_requirements:
      - approved
      - mergeable

  - name: aws-security-manager
    dir: live/security-managers/aws
    workspace: default
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"
    apply_requirements:
      - approved
      - mergeable

  - name: azure-security-manager
    dir: live/security-managers/azure
    workspace: default
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"
    apply_requirements:
      - approved
      - mergeable

  - name: gcp-security-manager
    dir: live/security-managers/gcp
    workspace: default
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"
    apply_requirements:
      - approved
      - mergeable
